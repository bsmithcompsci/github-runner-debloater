name: Release CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-ci
  cancel-in-progress: false

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate release app token
        id: release_app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write

      - name: Checkout (full history for tag detection)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.release_app_token.outputs.token }}

      - name: Determine latest semver tag
        id: get_tag
        run: |
          LATEST_TAG="v0.0.0"
          while IFS= read -r TAG; do
            if [[ "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              LATEST_TAG="${TAG}"
              break
            fi
          done < <(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname)
          echo "latest_tag=${LATEST_TAG}" >> "${GITHUB_OUTPUT}"
          echo "Latest tag: ${LATEST_TAG}"

      - name: Check whether action.yml changed
        id: action_changed
        run: |
          LATEST="${{ steps.get_tag.outputs.latest_tag }}"

          if [[ "${LATEST}" == "v0.0.0" ]]; then
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            echo "No prior semver release found; action.yml will be released."
            exit 0
          fi

          if git diff --quiet "${LATEST}..HEAD" -- action.yml; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            echo "action.yml has not changed since ${LATEST}; skipping release."
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            echo "action.yml changed since ${LATEST}; release will be created."
          fi

      - name: Compute next patch version
        id: next_version
        if: steps.action_changed.outputs.changed == 'true'
        run: |
          LATEST="${{ steps.get_tag.outputs.latest_tag }}"
          # Strip leading 'v'
          VERSION="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION}"
          PATCH=$(( PATCH + 1 ))
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=${NEW_TAG}" >> "${GITHUB_OUTPUT}"
          echo "Next tag: ${NEW_TAG}"

      - name: Create and push tag
        if: steps.action_changed.outputs.changed == 'true'
        env:
          RELEASE_APP_TOKEN: ${{ steps.release_app_token.outputs.token }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${RELEASE_APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git tag "${{ steps.next_version.outputs.new_tag }}"
          git push origin "${{ steps.next_version.outputs.new_tag }}"

      - name: Update major and minor version tags
        if: steps.action_changed.outputs.changed == 'true'
        env:
          RELEASE_APP_TOKEN: ${{ steps.release_app_token.outputs.token }}
        run: |
          NEW_TAG="${{ steps.next_version.outputs.new_tag }}"
          VERSION="${NEW_TAG#v}"
          IFS='.' read -r MAJOR MINOR _PATCH <<< "${VERSION}"

          MAJOR_TAG="v${MAJOR}"
          MINOR_TAG="v${MAJOR}.${MINOR}"

          git tag -f "${MAJOR_TAG}" "${NEW_TAG}"
          git tag -f "${MINOR_TAG}" "${NEW_TAG}"

          git remote set-url origin "https://x-access-token:${RELEASE_APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          push_version_tag() {
            local tag="$1"
            local expected
            expected="$(git ls-remote --tags origin "refs/tags/${tag}" | awk '{print $1}')"

            if [ -n "${expected}" ]; then
              git push --force-with-lease="refs/tags/${tag}:${expected}" origin "refs/tags/${tag}"
            else
              git push origin "refs/tags/${tag}"
            fi
          }

          push_version_tag "${MAJOR_TAG}"
          push_version_tag "${MINOR_TAG}"

          echo "Updated ${MAJOR_TAG} and ${MINOR_TAG} to ${NEW_TAG}"

      - name: Create GitHub Release
        if: steps.action_changed.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.release_app_token.outputs.token }}
          script: |
            const tag  = '${{ steps.next_version.outputs.new_tag }}';
            const repo = context.repo;

            const previousTag = '${{ steps.get_tag.outputs.latest_tag }}';
            let body = `## What's Changed\n\n`;

            if (previousTag !== 'v0.0.0') {
              const comparison = await github.rest.repos.compareCommitsWithBasehead({
                owner: repo.owner,
                repo:  repo.repo,
                basehead: `${previousTag}...${tag}`,
              });
              const commits = comparison.data.commits;
              if (commits.length > 0) {
                body += commits
                  .map(c => `- ${c.commit.message.split('\n')[0]} (${c.sha.slice(0, 7)})`)
                  .join('\n');
              } else {
                body += '_No new commits._';
              }
            } else {
              body += '_Initial release._';
            }

            body += `\n\n**Full Changelog**: https://github.com/${repo.owner}/${repo.repo}/commits/${tag}`;

            await github.rest.repos.createRelease({
              owner:      repo.owner,
              repo:       repo.repo,
              tag_name:   tag,
              name:       `Release ${tag}`,
              body:       body,
              draft:      false,
              prerelease: false,
            });

            console.log(`Created release ${tag}`);
