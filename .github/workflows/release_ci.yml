name: Release CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-ci
  cancel-in-progress: false

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate release app token
        id: release_app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write

      - name: Checkout (full history for tag detection)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.release_app_token.outputs.token }}
          persist-credentials: false

      - name: Report release app identity
        id: release_app_identity
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.release_app_token.outputs.token }}
          script: |
            const appSlug = '${{ steps.release_app_token.outputs.app-slug }}';
            const app = await github.request('GET /apps/{app_slug}', {
              app_slug: appSlug,
            });

            core.setOutput('app_id', app.data.id);
            core.notice(`Release app slug: ${appSlug}`);
            core.notice(`Release app id: ${app.data.id}`);
            core.notice(`Release app installation: ${{ steps.release_app_token.outputs.installation-id }}`);

      - name: Determine latest semver tag
        id: get_tag
        run: |
          LATEST_TAG="v0.0.0"
          while IFS= read -r TAG; do
            if [[ "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              LATEST_TAG="${TAG}"
              break
            fi
          done < <(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname)
          echo "latest_tag=${LATEST_TAG}" >> "${GITHUB_OUTPUT}"
          echo "Latest tag: ${LATEST_TAG}"

      - name: Check whether action.yml changed
        id: action_changed
        run: |
          LATEST="${{ steps.get_tag.outputs.latest_tag }}"

          if [[ "${LATEST}" == "v0.0.0" ]]; then
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            echo "No prior semver release found; action.yml will be released."
            exit 0
          fi

          if git diff --quiet "${LATEST}..HEAD" -- action.yml; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            echo "action.yml has not changed since ${LATEST}; skipping release."
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            echo "action.yml changed since ${LATEST}; release will be created."
          fi

      - name: Compute next patch version
        id: next_version
        if: steps.action_changed.outputs.changed == 'true'
        run: |
          LATEST="${{ steps.get_tag.outputs.latest_tag }}"
          # Strip leading 'v'
          VERSION="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION}"
          PATCH=$(( PATCH + 1 ))
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=${NEW_TAG}" >> "${GITHUB_OUTPUT}"
          echo "Next tag: ${NEW_TAG}"

      - name: Update floating version tags
        if: steps.action_changed.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.release_app_token.outputs.token }}
          script: |
            const newTag = '${{ steps.next_version.outputs.new_tag }}';
            const [, major, minor] = newTag.match(/^v(\d+)\.(\d+)\.(\d+)$/);
            const tags = [`v${major}`, `v${major}.${minor}`];

            for (const tag of tags) {
              const ref = `tags/${tag}`;

              try {
                await github.rest.git.updateRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref,
                  sha: context.sha,
                  force: true,
                });
                console.log(`Updated refs/${ref} to ${context.sha}`);
              } catch (error) {
                if (error.status === 422 && error.message.includes('Repository rule violations')) {
                  core.error(
                    `GitHub rejected refs/${ref}. Confirm every active ruleset targeting refs/${ref} has a bypass actor ` +
                    `with actor_type "Integration", actor_id "${{ steps.release_app_identity.outputs.app_id }}", and bypass_mode "always".`
                  );
                }

                if (error.status !== 404) {
                  throw error;
                }

                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `refs/${ref}`,
                  sha: context.sha,
                });
                console.log(`Created refs/${ref} at ${context.sha}`);
              }
            }
            
      - name: Create release tag
        if: steps.action_changed.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.release_app_token.outputs.token }}
          script: |
            const tag = '${{ steps.next_version.outputs.new_tag }}';
            const ref = `refs/tags/${tag}`;

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref,
              sha: context.sha,
            });

            console.log(`Created ${ref} at ${context.sha}`);

      - name: Create GitHub Release
        if: steps.action_changed.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.release_app_token.outputs.token }}
          script: |
            const tag  = '${{ steps.next_version.outputs.new_tag }}';
            const repo = context.repo;

            const previousTag = '${{ steps.get_tag.outputs.latest_tag }}';
            let body = `## What's Changed\n\n`;

            if (previousTag !== 'v0.0.0') {
              const comparison = await github.rest.repos.compareCommitsWithBasehead({
                owner: repo.owner,
                repo:  repo.repo,
                basehead: `${previousTag}...${tag}`,
              });
              const commits = comparison.data.commits;
              if (commits.length > 0) {
                body += commits
                  .map(c => `- ${c.commit.message.split('\n')[0]} (${c.sha.slice(0, 7)})`)
                  .join('\n');
              } else {
                body += '_No new commits._';
              }
            } else {
              body += '_Initial release._';
            }

            body += `\n\n**Full Changelog**: https://github.com/${repo.owner}/${repo.repo}/commits/${tag}`;

            await github.rest.repos.createRelease({
              owner:      repo.owner,
              repo:       repo.repo,
              tag_name:   tag,
              name:       `Release ${tag}`,
              body:       body,
              draft:      false,
              prerelease: false,
            });

            console.log(`Created release ${tag}`);
