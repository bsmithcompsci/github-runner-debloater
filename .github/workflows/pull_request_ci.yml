name: Pull Request CI

on:
  pull_request:
    branches:
      - main

# Minimal permissions: jobs only need to checkout code.
permissions:
  contents: read

jobs:
  # Validate the action definition with actionlint.
  validate:
    name: Validate Action (actionlint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash \
            | bash -s -- latest /usr/local/bin

      - name: Run actionlint
        run: actionlint -color

  # Minimal cleanup: all defaults remove every supported tool.
  test-minimal:
    name: 'Test: Minimal (remove all)'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run debloater with all defaults
        uses: ./
        with:
          verbose: 'true'
          verbose-depth: '5'

      - name: Verify default cleanup removed expected tool caches
        run: |
          REMAINING=0

          assert_removed() {
            local path="$1"

            if compgen -G "${path}" > /dev/null; then
              echo "::error::Expected ${path} to be removed, but it still exists."
              REMAINING=1
            else
              echo "Removed: ${path}"
            fi
          }

          assert_removed '/usr/share/dotnet'
          assert_removed '/usr/local/lib/android'
          assert_removed '/opt/ghc'
          assert_removed '/usr/local/.ghcup'
          assert_removed '/usr/share/swift'
          assert_removed '/usr/lib/jvm'
          assert_removed '/usr/local/share/powershell'
          assert_removed '/usr/local/share/chromium'
          assert_removed '/usr/local/julia*'
          assert_removed '/usr/bin/g++*'
          assert_removed '/usr/bin/gcc*'
          assert_removed '/usr/lib/gcc'
          assert_removed '/usr/include'
          assert_removed '/opt/hostedtoolcache/Python'
          assert_removed '/usr/share/miniconda'
          assert_removed '/opt/pipx'
          assert_removed '/opt/hostedtoolcache/PyPy'
          assert_removed '/usr/lib/google-cloud-sdk'
          assert_removed '/opt/google'
          assert_removed '/opt/az'
          assert_removed '/usr/share/az_*'
          assert_removed '/opt/microsoft'
          assert_removed '/opt/hostedtoolcache/CodeQL'
          assert_removed '/opt/hostedtoolcache/go'
          assert_removed '/opt/hostedtoolcache/node'
          assert_removed '/usr/local/bin/npm'
          assert_removed '/usr/local/bin/npx'
          assert_removed '/usr/local/bin/corepack'
          assert_removed '/usr/local/bin/yarn'
          assert_removed '/usr/local/bin/yarnpkg'
          assert_removed '/usr/local/lib/node_modules/npm'
          assert_removed '/usr/local/lib/node_modules/corepack'
          assert_removed '/usr/local/include/node'
          assert_removed '/opt/yarn-v*'
          assert_removed '/opt/hostedtoolcache/Ruby'
          assert_removed '/usr/bin/perl*'
          assert_removed '/usr/share/perl'
          assert_removed '/usr/lib/llvm-*'
          assert_removed '/var/lib/mysql'
          assert_removed '/var/lib/postgresql'
          assert_removed '/var/lib/mecab'
          assert_removed '/usr/share/doc'
          assert_removed '/usr/share/locale'
          assert_removed '/usr/share/man'

          if [ "${REMAINING}" -ne 0 ]; then
            exit 1
          fi

      - name: Verify disk space meets baseline
        run: |
          BASELINE_GB=$(jq -r '.maximum_used_gb' metrics/baseline.json)

          USED_KB=$(df / --output=used | tail -1)
          USED_GB=$(( USED_KB / 1024 / 1024 ))

          echo "Used disk space : ${USED_GB} GB"
          echo "Baseline maximum: ${BASELINE_GB} GB"

          if [ "${USED_GB}" -gt "${BASELINE_GB}" ]; then
            echo "::error::Disk usage ${USED_GB} GB exceeds baseline maximum ${BASELINE_GB} GB"
            exit 1
          fi
          echo "Disk space check passed, Usage: ${USED_GB} GB <= ${BASELINE_GB} GB"

  # Scenario: Node.js runtime only.
  test-node-project:
    name: 'Test: Node.js project (keep node runtime only)'
    needs: test-minimal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run debloater keeping Node.js
        uses: ./
        with:
          enable_node: 'true'

      - name: Verify Node.js is still available
        run: node --version

      - name: Verify npm is removed when not explicitly kept
        run: |
          if command -v npm >/dev/null 2>&1 || command -v npx >/dev/null 2>&1; then
            echo "::error::Expected npm and npx to be removed unless enable_npm=true."
            exit 1
          fi

  # Scenario: Node.js with npm and npx.
  test-node-npm-project:
    name: 'Test: Node.js project (keep node + npm)'
    needs: test-minimal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run debloater keeping Node.js and npm
        uses: ./
        with:
          enable_node: 'true'
          enable_npm: 'true'

      - name: Verify Node.js and npm are still available
        run: |
          node --version
          npm --version
          npx --version

  # Scenario: Python project.
  test-python-project:
    name: 'Test: Python project (keep python + miniconda)'
    needs: test-minimal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run debloater keeping Python and Miniconda
        uses: ./
        with:
          enable_python: 'true'
          enable_miniconda: 'true'

      - name: Verify Python is still available
        run: python3 --version

  # Scenario: Go project.
  test-go-project:
    name: 'Test: Go project (keep go)'
    needs: test-minimal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run debloater keeping Go
        uses: ./
        with:
          enable_go: 'true'

      - name: Verify Go is still available
        run: go version

  # Scenario: .NET project.
  test-dotnet-project:
    name: 'Test: .NET project (keep dotnet)'
    needs: test-minimal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run debloater keeping .NET
        uses: ./
        with:
          enable_dotnet: 'true'

      - name: Verify .NET is still available
        run: dotnet --version

  # Scenario: Ruby project.
  test-ruby-project:
    name: 'Test: Ruby project (keep ruby)'
    needs: test-minimal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run debloater keeping Ruby
        uses: ./
        with:
          enable_ruby: 'true'

      - name: Verify Ruby is still available
        run: ruby --version

  # Scenario: Java project.
  test-java-project:
    name: 'Test: Java project (keep java)'
    needs: test-minimal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run debloater keeping Java
        uses: ./
        with:
          enable_java: 'true'

      - name: Verify Java is still available
        run: java -version

  # Cross-dependency error: C++ without C.
  test-cpp-requires-c:
    name: 'Test: C++ without C must fail'
    needs: test-minimal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run debloater (cpp=true, c=false) - expected to fail
        id: debloat
        continue-on-error: true
        uses: ./
        with:
          enable_cpp: 'true'
          enable_c: 'false'

      - name: Assert the action correctly rejected the invalid combination
        run: |
          if [ "${{ steps.debloat.outcome }}" != "failure" ]; then
            echo "::error::Expected the action to fail when enable_cpp=true and enable_c=false, but it succeeded."
            exit 1
          fi
          echo "Dependency check correctly rejected c++ without c"

  # Cross-dependency error: npm without Node.js.
  test-npm-requires-node:
    name: 'Test: npm without Node.js must fail'
    needs: test-minimal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run debloater (npm=true, node=false) - expected to fail
        id: debloat
        continue-on-error: true
        uses: ./
        with:
          enable_npm: 'true'
          enable_node: 'false'

      - name: Assert the action correctly rejected the invalid combination
        run: |
          if [ "${{ steps.debloat.outcome }}" != "failure" ]; then
            echo "::error::Expected the action to fail when enable_npm=true and enable_node=false, but it succeeded."
            exit 1
          fi
          echo "Dependency check correctly rejected npm without node"

  # Cross-dependency error: Chromium without Google.
  test-chromium-requires-google:
    name: 'Test: Chromium without Google must fail'
    needs: test-minimal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run debloater (chromium=true, google=false) - expected to fail
        id: debloat
        continue-on-error: true
        uses: ./
        with:
          enable_chromium: 'true'
          enable_google: 'false'

      - name: Assert the action correctly rejected the invalid combination
        run: |
          if [ "${{ steps.debloat.outcome }}" != "failure" ]; then
            echo "::error::Expected the action to fail when enable_chromium=true and enable_google=false, but it succeeded."
            exit 1
          fi
          echo "Dependency check correctly rejected chromium without google"

  # Cross-dependency error: Miniconda without Python.
  test-miniconda-requires-python:
    name: 'Test: Miniconda without Python must fail'
    needs: test-minimal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run debloater (miniconda=true, python=false) - expected to fail
        id: debloat
        continue-on-error: true
        uses: ./
        with:
          enable_miniconda: 'true'
          enable_python: 'false'

      - name: Assert the action correctly rejected the invalid combination
        run: |
          if [ "${{ steps.debloat.outcome }}" != "failure" ]; then
            echo "::error::Expected the action to fail when enable_miniconda=true and enable_python=false, but it succeeded."
            exit 1
          fi
          echo "Dependency check correctly rejected miniconda without python"

  # Cross-dependency error: pipx without Python.
  test-pipx-requires-python:
    name: 'Test: pipx without Python must fail'
    needs: test-minimal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run debloater (pipx=true, python=false) - expected to fail
        id: debloat
        continue-on-error: true
        uses: ./
        with:
          enable_pipx: 'true'
          enable_python: 'false'

      - name: Assert the action correctly rejected the invalid combination
        run: |
          if [ "${{ steps.debloat.outcome }}" != "failure" ]; then
            echo "::error::Expected the action to fail when enable_pipx=true and enable_python=false, but it succeeded."
            exit 1
          fi
          echo "Dependency check correctly rejected pipx without python"

  # Cross-dependency error: PyPy without Python.
  test-pypy-requires-python:
    name: 'Test: PyPy without Python must fail'
    needs: test-minimal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run debloater (pypy=true, python=false) - expected to fail
        id: debloat
        continue-on-error: true
        uses: ./
        with:
          enable_pypy: 'true'
          enable_python: 'false'

      - name: Assert the action correctly rejected the invalid combination
        run: |
          if [ "${{ steps.debloat.outcome }}" != "failure" ]; then
            echo "::error::Expected the action to fail when enable_pypy=true and enable_python=false, but it succeeded."
            exit 1
          fi
          echo "Dependency check correctly rejected pypy without python"
